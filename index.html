<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Coin des Animaux - FLE A1</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --seashell: #FFF4EB; --wheat: #F6E0B6; --french-blue: #3E4B8E;
            --midnight-violet: #3D1534; --success: #2e7d32; --error: #c62828;
            --glass-bg: #ffffff; --neo-shadow: 0 20px 40px rgba(61, 21, 52, 0.06);
        }
        body { font-family: 'Poppins', sans-serif; background-color: var(--seashell); color: var(--midnight-violet); margin: 0; padding: 50px 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* تصميم الصفحة الأولى */
        .hero-section { display: grid; grid-template-columns: 1fr 1fr; align-items: center; gap: 40px; padding: 60px; background: white; border-radius: 32px; box-shadow: var(--neo-shadow); }
        .hero-content h1 { font-size: 2.8rem; font-weight: 800; margin-bottom: 20px; color: var(--midnight-violet); }
        .hero-image { background: var(--seashell); border-radius: 24px; padding: 40px; text-align: center; }
        
        .page { display: none; background: var(--glass-bg); border-radius: 32px; padding: 50px; box-shadow: var(--neo-shadow); }
        .page.active { display: block; }
        
        .btn-primary { background: linear-gradient(135deg, var(--french-blue), #252e5c); color: white; border: none; padding: 16px 36px; border-radius: 18px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-primary:hover { transform: translateY(-3px); }
        
        .quiz-option { display: block; width: 100%; padding: 18px; margin: 10px 0; border: 2px solid #eee; border-radius: 16px; cursor: pointer; text-align: left; transition: 0.3s; }
        .quiz-option:hover { background: var(--wheat); }
        
        .bravo-img { width: 200px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <!-- الصفحة 0: الترحيب -->
    <div class="page active" id="page-0">
        <div class="hero-section">
            <div class="hero-content">
                <h1>Le Coin des Animaux</h1>
                <p>Bienvenue ! Découvrons les animaux de compagnie en français.</p>
                <button class="btn-primary" onclick="changePage(1)">Commencer</button>
            </div>
            <div class="hero-image">
                <img src="https://cdn-icons-png.flaticon.com/512/3069/3069172.png" alt="Animaux" style="width: 100%;">
            </div>
        </div>
    </div>

    <!-- الصفحة 1: المعلومات -->
    <div class="page" id="page-1">
        <h2>Identification</h2>
        <input type="text" id="nom" placeholder="Votre nom" style="width:100%; padding:15px; border-radius:12px; border:1px solid #ccc; margin-bottom:20px;">
        <button class="btn-primary" onclick="changePage(1)">Suivant ➡</button>
    </div>

    <!-- الصفحة 2: Comprehension Orale -->
    <div class="page" id="page-2">
        <h2>Compréhension Orale</h2>
        <p>Qui est Thomas ?</p>
        <button class="quiz-option" onclick="alert('Bravo !')">Un garçon</button>
        <button class="quiz-option" onclick="alert('Réessayez !')">Une fille</button>
        <button class="btn-primary" onclick="changePage(1)" style="margin-top:20px;">Suivant ➡</button>
    </div>

    <!-- الصفحة الأخيرة: Bravo -->
    <div class="page" id="page-3">
        <div style="text-align: center;">
            <img src="https://cdn-icons-png.flaticon.com/512/616/616430.png" class="bravo-img" alt="Bravo">
            <h1>Bravo !</h1>
            <p>Tu as réussi toutes les activités avec succès !</p>
            <button class="btn-primary" onclick="location.reload()">Recommencer</button>
        </div>
    </div>
</div>

<script>
    let p = 0;
    function changePage(step) {
        document.getElementById('page-' + p).classList.remove('active');
        p += step;
        document.getElementById('page-' + p).classList.add('active');
    }
</script>

</body>
</html>
