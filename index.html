<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Coin des Animaux - FLE A1 Complet</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Poppins:wght@400;600&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --seashell: #FFF4EB;       
            --wheat: #F6E0B6;          
            --powder-blue: #A6BCC9;    
            --french-blue: #3E4B8E;    
            --midnight-violet: #3D1534;
            --success: #2e7d32;
            --error: #c62828;
            --font-main: 'Nunito', sans-serif;
            --font-headings: 'Poppins', sans-serif;
        }

        body { font-family: var(--font-main); background-color: var(--seashell); color: var(--midnight-violet); margin: 0; padding: 40px 20px; }
        .container { max-width: 950px; margin: 0 auto; }

        header { text-align: center; padding: 40px; background: linear-gradient(135deg, var(--midnight-violet) 0%, var(--french-blue) 100%); color: #fff; border-radius: 30px; margin-bottom: 30px; }
        h1, h2 { font-family: var(--font-headings); }

        .page { display: none; background: #fff; border-radius: 30px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .page.active { display: block; }

        /* Vocabulary Section */
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-top: 20px; }
        .vocab-card { background: #fdfdfd; border: 2px solid #eee; padding: 20px; border-radius: 20px; text-align: center; }
        
        button.btn-primary { background: var(--french-blue); color: white; border: none; padding: 15px 30px; border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button.btn-primary:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        .feedback { margin-top: 15px; padding: 10px; border-radius: 10px; font-weight: bold; }
        
        /* Confetti Animation Placeholder */
        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Le Coin des Animaux 🐾</h1>
        <p>Niveau FLE A1 - Module Interactif Universitaire</p>
    </header>

    <!-- Navigation -->
    <div id="dots-container" style="display:flex; justify-content:center; gap:10px; margin-bottom:20px;">
        <div class="dot active" style="width:10px; height:10px; background:var(--french-blue); border-radius:50%;"></div>
    </div>

    <!-- Page 0: Login -->
    <div class="page active" id="page-0">
        <h2>Identification</h2>
        <input type="text" id="student-name" placeholder="Nom de l'étudiant" style="width:100%; padding:15px; margin:10px 0;">
        <button class="btn-primary" onclick="startModule()">Commencer</button>
    </div>

    <!-- Page 1: Dashboard -->
    <div class="page" id="page-1">
        <h2>Menu Principal</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <button class="btn-primary" onclick="goToPage(2)">Compréhension Orale</button>
            <button class="btn-primary" onclick="goToPage(3)">Compréhension Écrite</button>
            <button class="btn-primary" onclick="goToPage(4)">Lexique (Nouveau)</button>
        </div>
    </div>

    <!-- Page 4: Lexique (New Feature) -->
    <div class="page" id="page-4">
        <h2>Lexique des Animaux</h2>
        <div class="vocab-grid">
            <div class="vocab-card">🐈‍⬛<br><strong>Chat</strong></div>
            <div class="vocab-card">🐕<br><strong>Chien</strong></div>
            <div class="vocab-card">🐇<br><strong>Lapin</strong></div>
            <div class="vocab-card">🐦<br><strong>Oiseau</strong></div>
        </div>
        <button class="btn-primary" onclick="goToPage(1)" style="margin-top:20px;">Retour</button>
    </div>

    <!-- Page 7: Results -->
    <div class="page" id="page-7">
        <h2>Résultats Finaux</h2>
        <div id="results-content"></div>
        <button class="btn-primary" onclick="window.print()">Imprimer Rapport</button>
    </div>
</div>

<div id="confetti"></div>

<script>
    let currentPage = 0;
    let scores = { co: 0, ce: 0 };

    function startModule() {
        const name = document.getElementById('student-name').value;
        if (!name) return alert("Veuillez entrer votre nom !");
        goToPage(1);
    }

    function goToPage(index) {
        document.getElementById(`page-${currentPage}`).classList.remove('active');
        currentPage = index;
        document.getElementById(`page-${currentPage}`).classList.add('active');
    }

    function validateBlanks() {
        let b1 = document.getElementById('blank-1')?.value.toLowerCase();
        // منطق التحقق المكتمل
        if (b1 === 'animal') {
            scores.ce += 10;
            document.getElementById('blanks-feedback').innerText = "Bravo !";
            triggerConfetti();
        } else {
            document.getElementById('blanks-feedback').innerText = "Réessayez !";
        }
    }

    function triggerConfetti() {
        const c = document.getElementById('confetti');
        c.innerHTML = "<h1 style='text-align:center; margin-top:20%; color:var(--french-blue)'>🎉 Félicitations ! 🎉</h1>";
        setTimeout(() => c.innerHTML = "", 3000);
    }
</script>

</body>
</html>
