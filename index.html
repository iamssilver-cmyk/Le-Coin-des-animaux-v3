<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Coin des Animaux - FLE A1</title>
    <style>
        :root { --seashell: #FFF4EB; --wheat: #F6E0B6; --french-blue: #3E4B8E; --midnight-violet: #3D1534; --success: #2e7d32; --error: #c62828; }
        body { font-family: sans-serif; background-color: var(--seashell); color: var(--midnight-violet); margin: 0; padding: 40px 20px; }
        .container { max-width: 850px; margin: 0 auto; }
        header { text-align: center; padding: 40px; background: linear-gradient(135deg, var(--midnight-violet), var(--french-blue)); color: var(--seashell); border-radius: 24px; margin-bottom: 35px; }
        .page { display: none; background: #ffffff; border-radius: 24px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .page.active { display: block; }
        button.btn-primary { background: var(--french-blue); color: white; border: none; padding: 14px 32px; border-radius: 14px; cursor: pointer; font-weight: bold; }
        .quiz-option { display: block; width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--wheat); border-radius: 12px; cursor: pointer; text-align: left; }
        .quiz-option:hover { background: var(--wheat); }
    </style>
</head>
<body>

<div class="container">
    <header><h1>Le Coin des Animaux 🐾</h1></header>

    <div class="page active" id="page-0">
        <h2>Identification</h2>
        <input type="text" id="nom" placeholder="Votre nom" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;">
        <button class="btn-primary" onclick="suivant()">Commencer</button>
    </div>

    <div class="page" id="page-1">
        <h2>Compétences</h2>
        <button class="btn-primary" onclick="aller(2)">Compréhension Orale</button>
        <button class="btn-primary" onclick="aller(3)">Compréhension Écrite</button>
    </div>

    <div class="page" id="page-2">
        <h2>Compréhension Orale</h2>
        <p>Qui est Thomas ?</p>
        <button class="quiz-option" onclick="valider(this, true)">Un garçon</button>
        <button class="quiz-option" onclick="valider(this, false)">Une fille</button>
    </div>

    <div class="page" id="page-3">
        <h2>Compréhension Écrite</h2>
        <p>Le chien s'appelle Max, Vrai ou Faux ?</p>
        <button class="quiz-option" onclick="valider(this, true)">Vrai</button>
        <button class="quiz-option" onclick="valider(this, false)">Faux</button>
    </div>
</div>

<script>
    let p = 0;
    function aller(i) {
        document.querySelector('.page.active').classList.remove('active');
        document.getElementById('page-' + i).classList.add('active');
        p = i;
    }
    function suivant() { aller(p + 1); }
    function valider(btn, estCorrect) {
        btn.style.backgroundColor = estCorrect ? 'var(--success)' : 'var(--error)';
        btn.style.color = 'white';
        alert(estCorrect ? 'Bravo !' : 'Réessayez !');
    }
</script>

</body>
</html>
